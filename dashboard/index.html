<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerOps — Job Search Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── Design Tokens (ui-ux-pro-max: Modern Dark Cinema) ─── */
:root {
  --bg-deep:    #07070A;
  --bg-base:    #0D0D12;
  --bg-raised:  #12121A;
  --bg-overlay: #191924;
  --surface:    rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border:     rgba(255,255,255,0.08);
  --border-focus: rgba(94,106,210,0.6);

  --fg:         #EDEDEF;
  --fg-muted:   #8A8F98;
  --fg-subtle:  #55596A;

  --accent:     #5E6AD2;
  --accent-dim: rgba(94,106,210,0.15);
  --accent-glow:rgba(94,106,210,0.25);

  --green:      #10B981;
  --green-dim:  rgba(16,185,129,0.12);
  --amber:      #F59E0B;
  --amber-dim:  rgba(245,158,11,0.12);
  --red:        #EF4444;
  --red-dim:    rgba(239,68,68,0.12);
  --gray:       #4B5563;
  --gray-dim:   rgba(75,85,99,0.15);

  --radius-sm:  6px;
  --radius:     10px;
  --radius-lg:  16px;
  --radius-xl:  22px;

  --ease:       cubic-bezier(0.16, 1, 0.3, 1);
  --ease-fast:  cubic-bezier(0.4, 0, 0.2, 1);

  --font: 'Inter', -apple-system, sans-serif;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg-deep);
  color: var(--fg);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* ─── Layout ─── */
.app { display: grid; grid-template-rows: auto auto 1fr; min-height: 100dvh; }

/* ─── Header ─── */
.header {
  background: var(--bg-base);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 20px;
  height: 56px;
  max-width: 1600px;
  margin: 0 auto;
}
.logo {
  font-size: 15px;
  font-weight: 600;
  color: var(--fg);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.logo-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent-glow);
}

.header-stats {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-muted);
  white-space: nowrap;
}
.stat-pill .num {
  font-weight: 600;
  font-size: 13px;
}
.stat-pill.apply .num { color: var(--green); }
.stat-pill.pending .num { color: var(--amber); }
.stat-pill.done .num { color: var(--accent); }

.btn-add {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: all 150ms var(--ease-fast);
  flex-shrink: 0;
}
.btn-add:hover { background: #6B7DE0; transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }
.btn-add:active { transform: translateY(0); }
.btn-add svg { width: 14px; height: 14px; }

/* ─── Toolbar ─── */
.toolbar {
  background: var(--bg-base);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
}
.toolbar-inner {
  display: flex;
  gap: 10px;
  align-items: center;
  max-width: 1600px;
  margin: 0 auto;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--fg-subtle);
  width: 16px; height: 16px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 7px 12px 7px 34px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--fg);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border-color 150ms;
}
.search-input:focus { border-color: var(--border-focus); }
.search-input::placeholder { color: var(--fg-subtle); }

.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg-muted);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 150ms var(--ease-fast);
  white-space: nowrap;
}
.filter-btn:hover { background: var(--surface-hover); color: var(--fg); }
.filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

.sort-select {
  padding: 5px 10px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--fg-muted);
  font-family: var(--font);
  font-size: 12px;
  outline: none;
  cursor: pointer;
}
.sort-select:focus { border-color: var(--border-focus); color: var(--fg); }

.view-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.view-btn {
  padding: 5px 10px;
  background: transparent;
  border: none;
  color: var(--fg-subtle);
  cursor: pointer;
  transition: all 150ms;
  display: flex;
  align-items: center;
}
.view-btn:hover { background: var(--surface); color: var(--fg-muted); }
.view-btn.active { background: var(--surface-hover); color: var(--fg); }
.view-btn svg { width: 15px; height: 15px; }

/* ─── Main Content ─── */
.main {
  display: flex;
  gap: 0;
  max-width: 1600px;
  margin: 0 auto;
  width: 100%;
  padding: 0;
  position: relative;
}

.cards-area {
  flex: 1;
  padding: 20px 24px;
  min-width: 0;
  transition: padding-right 350ms var(--ease);
}
.cards-area.panel-open { padding-right: 24px; }

/* ─── Section header ─── */
.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-subtle);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
  margin-top: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label:first-child { margin-top: 0; }
.section-label .count {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1px 7px;
  font-size: 11px;
  color: var(--fg-muted);
}

/* ─── Card Grid ─── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 10px;
}

/* ─── Card ─── */
.card {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  cursor: pointer;
  transition: all 200ms var(--ease);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--surface);
  opacity: 0;
  transition: opacity 150ms;
}
.card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-2px); box-shadow: var(--shadow); }
.card:hover::before { opacity: 1; }
.card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow); }
.card.selected::before { opacity: 1; background: var(--accent-dim); }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.card-company { font-size: 15px; font-weight: 600; color: var(--fg); }
.card-role { font-size: 12px; color: var(--fg-muted); margin-top: 2px; line-height: 1.4; }

.score-badge {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 46px; height: 46px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.score-badge .label { font-size: 9px; font-weight: 500; margin-top: 1px; opacity: 0.75; }
.score-high { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
.score-mid  { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
.score-low  { background: var(--gray-dim);  color: var(--fg-muted); border: 1px solid rgba(75,85,99,0.2); }
.score-bad  { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(239,68,68,0.2); }

.card-meta {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid transparent;
}
.chip-location { background: var(--surface); color: var(--fg-muted); border-color: var(--border); }
.chip-date { background: var(--surface); color: var(--fg-subtle); border-color: var(--border); }

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 9px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.status-evaluated { background: var(--accent-dim); color: var(--accent); }
.status-applied    { background: rgba(139,92,246,0.15); color: #A78BFA; }
.status-interview  { background: var(--amber-dim); color: var(--amber); }
.status-offer      { background: var(--green-dim); color: var(--green); }
.status-rejected   { background: var(--red-dim); color: var(--red); }
.status-skip       { background: var(--gray-dim); color: var(--fg-subtle); }

.card-rec {
  font-size: 12px;
  color: var(--fg-muted);
  display: flex;
  align-items: center;
  gap: 4px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.card-rec .rec-icon { font-size: 10px; }
.rec-apply { color: var(--green); }
.rec-maybe { color: var(--amber); }
.rec-skip  { color: var(--fg-subtle); }

.card-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--surface);
  color: var(--fg-subtle);
  border: 1px solid var(--border);
}

/* ─── Table view ─── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 4px;
}
thead th {
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-subtle);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 6px 12px;
  text-align: left;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
thead th:hover { color: var(--fg-muted); }
tbody tr {
  background: var(--bg-raised);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 150ms;
}
tbody tr:hover { background: var(--bg-overlay); }
tbody tr.selected { background: rgba(94,106,210,0.08); outline: 1px solid var(--accent); }
tbody td { padding: 12px 12px; font-size: 13px; }
tbody td:first-child { border-radius: var(--radius) 0 0 var(--radius); }
tbody td:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.td-company { font-weight: 600; }
.td-role { color: var(--fg-muted); font-size: 12px; max-width: 260px; }
.td-score { font-weight: 700; font-variant-numeric: tabular-nums; }

/* ─── Detail Panel ─── */
.detail-panel {
  width: 0;
  min-width: 0;
  overflow: hidden;
  transition: width 350ms var(--ease), min-width 350ms var(--ease);
  border-left: 1px solid transparent;
  position: sticky;
  top: 116px;
  height: calc(100dvh - 116px);
  align-self: flex-start;
}
.detail-panel.open {
  width: 440px;
  min-width: 440px;
  border-left-color: var(--border);
  overflow-y: auto;
}
.panel-inner {
  width: 440px;
  padding: 20px;
  opacity: 0;
  transition: opacity 200ms 100ms var(--ease);
}
.detail-panel.open .panel-inner { opacity: 1; }

.panel-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 12px;
}
.panel-company { font-size: 19px; font-weight: 700; color: var(--fg); }
.panel-role { font-size: 13px; color: var(--fg-muted); margin-top: 2px; }

.close-btn {
  flex-shrink: 0;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg-muted);
  cursor: pointer;
  transition: all 150ms;
}
.close-btn:hover { background: var(--surface-hover); color: var(--fg); }
.close-btn svg { width: 14px; height: 14px; }

.panel-score-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.score-big {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
}

.blocks-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.block-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  gap: 2px;
}
.block-label { font-size: 9px; font-weight: 600; color: var(--fg-subtle); text-transform: uppercase; }
.block-score { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }

.panel-section { margin-bottom: 16px; }
.panel-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-subtle);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.panel-section p {
  font-size: 13px;
  color: var(--fg-muted);
  line-height: 1.6;
}
.panel-section .highlight {
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--fg-muted);
  line-height: 1.6;
}
.panel-section .highlight.match { border-left: 3px solid var(--green); }
.panel-section .highlight.gap   { border-left: 3px solid var(--amber); }
.panel-section .highlight.angle { border-left: 3px solid var(--accent); }

.research-block {
  background: var(--bg-overlay);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 12px;
}
.research-row {
  display: flex;
  gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 12px;
}
.research-row:last-child { border-bottom: none; }
.research-row .rkey { color: var(--fg-subtle); flex-shrink: 0; min-width: 70px; }
.research-row .rval { color: var(--fg-muted); }

.panel-links { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.link-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg-muted);
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  transition: all 150ms;
  cursor: pointer;
}
.link-btn:hover { background: var(--surface-hover); color: var(--fg); border-color: rgba(255,255,255,0.14); }
.link-btn svg { width: 12px; height: 12px; }
.link-btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.link-btn.primary:hover { background: rgba(94,106,210,0.25); }

.status-select-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 16px;
}
.status-select-row label { font-size: 12px; color: var(--fg-subtle); flex-shrink: 0; }
.status-select {
  flex: 1;
  padding: 6px 10px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--fg);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  cursor: pointer;
}
.status-select:focus { border-color: var(--border-focus); }

.notes-area {
  width: 100%;
  min-height: 80px;
  padding: 8px 10px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--fg);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  resize: vertical;
  outline: none;
  transition: border-color 150ms;
}
.notes-area:focus { border-color: var(--border-focus); }
.notes-area::placeholder { color: var(--fg-subtle); }

.save-btn {
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: all 150ms;
  margin-top: 8px;
}
.save-btn:hover { background: #6B7DE0; }

/* ─── Modal ─── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 24px;
  width: 100%;
  max-width: 520px;
  max-height: 90dvh;
  overflow-y: auto;
  transform: translateY(20px) scale(0.97);
  transition: transform 250ms var(--ease);
  box-shadow: var(--shadow-lg);
}
.modal-backdrop.open .modal { transform: translateY(0) scale(1); }

.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; color: var(--fg); }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--fg-muted); margin-bottom: 4px; display: block; }
.form-input {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg-overlay);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--fg);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border-color 150ms;
}
.form-input:focus { border-color: var(--border-focus); }
.form-input::placeholder { color: var(--fg-subtle); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel {
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg-muted);
  font-size: 13px;
  cursor: pointer;
  transition: all 150ms;
}
.btn-cancel:hover { background: var(--surface); color: var(--fg); }

/* ─── Empty state ─── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--fg-subtle);
  gap: 8px;
  text-align: center;
}
.empty svg { opacity: 0.3; width: 40px; height: 40px; margin-bottom: 4px; }
.empty .t { font-size: 14px; font-weight: 500; color: var(--fg-muted); }
.empty .s { font-size: 12px; }

/* ─── Toast ─── */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--bg-overlay);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--fg);
  z-index: 999;
  transition: transform 300ms var(--ease);
  white-space: nowrap;
  box-shadow: var(--shadow);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.green { border-color: rgba(16,185,129,0.3); color: var(--green); }

/* ─── Priority badge ─── */
.priority-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px; height: 18px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 700;
  background: var(--accent);
  color: #fff;
  flex-shrink: 0;
}
.priority-badge.p1 { background: var(--green); }
.priority-badge.p2 { background: #3B82F6; }
.priority-badge.p3 { background: #8B5CF6; }

/* ─── Responsive ─── */
@media (max-width: 900px) {
  .detail-panel.open { width: 100%; min-width: 100%; position: fixed; inset: 0; top: 0; height: 100dvh; z-index: 150; background: var(--bg-base); border-left: none; }
  .panel-inner { width: 100%; }
  .header-stats { display: none; }
}
@media (max-width: 600px) {
  .header-inner { gap: 12px; }
  .toolbar-inner { gap: 8px; }
  .cards-area { padding: 12px; }
  .card-grid { grid-template-columns: 1fr; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
}

/* ─── Contacts panel ─── */
.contacts-list { display: flex; flex-direction: column; gap: 10px; }
.contact-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.contact-card:hover { background: var(--surface-hover); }
.contact-header { display: flex; align-items: flex-start; gap: 8px; justify-content: space-between; }
.contact-name-block { display: flex; flex-direction: column; gap: 2px; }
.contact-name { font-size: 13px; font-weight: 600; color: var(--fg); }
.contact-title { font-size: 11px; color: var(--fg-muted); }
.contact-type {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
}
.contact-type.hm  { background: rgba(94,106,210,.15); color: var(--accent); border: 1px solid rgba(94,106,210,.25); }
.contact-type.rec { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16,185,129,.2); }
.contact-type.peer{ background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,.2); }
.contact-msg {
  font-size: 12px; color: var(--fg-muted); line-height: 1.5;
  background: rgba(0,0,0,.2); border-radius: var(--radius-sm);
  padding: 8px 10px; position: relative; cursor: pointer;
  border: 1px solid transparent;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.contact-msg.expanded { -webkit-line-clamp: unset; overflow: visible; }
.contact-msg:hover { border-color: var(--border); }
.contact-actions { display: flex; gap: 6px; margin-top: 2px; }
.contact-btn {
  font-size: 11px; font-weight: 500; padding: 4px 10px;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: transparent; color: var(--fg-muted); cursor: pointer;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  transition: all 120ms;
}
.contact-btn:hover { background: var(--surface-hover); color: var(--fg); }
.contact-btn.copy { color: var(--accent); border-color: rgba(94,106,210,.3); }
.contact-btn.copy:hover { background: var(--accent-dim); }

  <!-- Header -->

<div class="modal-backdrop" id="add-modal">

      <input class="form-input" id="f-url" type="url" placeholder="https://…">

      <div class="form-group">

      <input class="form-input" id="f-tags" type="text" placeholder="Design Systems, Remote EU, Tokens">
    </div>
    <div class="form-group">
      <label class="form-label">Notes / Match</label>
      <textarea class="form-input notes-area" id="f-notes" placeholder="Key match points, gaps, angle…" style="min-height:70px;resize:vertical"></textarea>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>

</div>

// ─── State ──────────────────────────────────────────────────────────────────
const LS_KEY = 'career-ops-v2';
let state = {
  overrides: {},   // id → { status, notes }
  custom: [],      // user-added entries
};
let selectedId = null;
let activeRecFilter = 'all';
let activeStatusFilter = 'all';
let currentView = 'cards';

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    state.overrides = s.overrides || {};
    state.custom = s.custom || [];
  } catch(e) {}
}
function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}

function allData() {
  const baseWithOverrides = BASE_DATA.map(d => {
    const ov = state.overrides[d.id] || {};
    return { ...d, status: ov.status || d.status, notes: ov.notes || '' };
  });
  return [...baseWithOverrides, ...state.custom];
}

// ─── Filters ────────────────────────────────────────────────────────────────
function setRecFilter(btn, val) {
  activeRecFilter = val;
  document.querySelectorAll('[data-rec]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setStatusFilter(btn, val) {
  activeStatusFilter = val;
  document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setView(v) {
  currentView = v;
  document.getElementById('view-cards').classList.toggle('active', v === 'cards');
  document.getElementById('view-table').classList.toggle('active', v === 'table');
  render();
}

function filterData(data) {
  const q = document.getElementById('search').value.toLowerCase();
  return data.filter(d => {
    if (q) {
      const hay = `${d.company} ${d.role} ${(d.tags||[]).join(' ')} ${d.location}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (activeRecFilter !== 'all') {
      const rec = d.rec.toLowerCase();
      if (activeRecFilter === 'apply' && !rec.startsWith('apply') || (activeRecFilter === 'apply' && rec.includes('if'))) return false;
      if (activeRecFilter === 'apply') {
        if (!rec.startsWith('apply') || rec.includes('if')) return false;
      }
      if (activeRecFilter === 'maybe' && !rec.includes('if')) return false;
      if (activeRecFilter === 'skip' && rec !== 'skip') return false;
    }
    if (activeStatusFilter !== 'all' && d.status !== activeStatusFilter) return false;
    return true;
  });
}

function sortData(data) {
  const s = document.getElementById('sort').value;
  return [...data].sort((a, b) => {
    if (s === 'score-desc') return b.score - a.score;
    if (s === 'score-asc')  return a.score - b.score;
    if (s === 'priority')   return (a.priority||99) - (b.priority||99);
    if (s === 'company')    return a.company.localeCompare(b.company);
    if (s === 'date-desc')  return (b.date||'').localeCompare(a.date||'');
    return 0;
  });
}

// ─── Score helpers ──────────────────────────────────────────────────────────
function scoreClass(s) {
  if (s >= 4.0) return 'score-high';
  if (s >= 3.5) return 'score-mid';
  if (s >= 2.5) return 'score-low';
  return 'score-bad';
}
function scoreColor(s) {
  if (s >= 4.0) return 'var(--green)';
  if (s >= 3.5) return 'var(--amber)';
  return 'var(--fg-subtle)';
}
function recClass(rec) {
  const r = rec.toLowerCase();
  if (r.startsWith('apply') && !r.includes('if')) return 'rec-apply';
  if (r.includes('if')) return 'rec-maybe';
  return 'rec-skip';
}
function statusClass(s) {
  const m = {Evaluated:'status-evaluated',Applied:'status-applied',Interview:'status-interview',Offer:'status-offer',Rejected:'status-rejected',SKIP:'status-skip'};
  return m[s] || 'status-evaluated';
}
function blockColor(v) {
  if (v >= 4.5) return 'var(--green)';
  if (v >= 3.5) return '#6EE7B7';
  if (v >= 2.5) return 'var(--amber)';
  return 'var(--red)';
}

// ─── Stats ──────────────────────────────────────────────────────────────────
function renderStats() {
  const data = allData();
  const toApply = data.filter(d => d.rec.toLowerCase().startsWith('apply') && !d.rec.toLowerCase().includes('if')).length;
  const applied = data.filter(d => d.status === 'Applied').length;
  const interview = data.filter(d => d.status === 'Interview').length;
  document.getElementById('header-stats').innerHTML = `
    <div class="stat-pill"><span class="num">${data.length}</span> offers</div>
    <div class="stat-pill apply"><span class="num">${toApply}</span> apply now</div>
    <div class="stat-pill pending"><span class="num">${applied}</span> applied</div>
    <div class="stat-pill done"><span class="num">${interview}</span> interview</div>
  `;
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  renderStats();
  const filtered = sortData(filterData(allData()));

  const applyNow = filtered.filter(d => d.rec.toLowerCase().startsWith('apply') && !d.rec.toLowerCase().includes('if'));
  const applyIf  = filtered.filter(d => d.rec.toLowerCase().includes('if'));
  const skip     = filtered.filter(d => d.rec.toLowerCase() === 'skip');

  const content = document.getElementById('content');

  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><div class="t">No offers match your filters</div><div class="s">Try changing the search or filter</div></div>`;
    return;
  }

  if (currentView === 'table') {
    content.innerHTML = renderTable(filtered);
    return;
  }

  let html = '';
  if (applyNow.length) html += renderSection('Apply now', applyNow, applyNow.length);
  if (applyIf.length)  html += renderSection('Verify first', applyIf, applyIf.length);
  if (skip.length && activeRecFilter !== 'apply' && activeRecFilter !== 'maybe') {
    html += renderSection('Skip', skip, skip.length);
  }
  content.innerHTML = html;
}

function renderSection(label, items, count) {
  return `<div class="section-label">${label} <span class="count">${count}</span></div>
    <div class="card-grid">${items.map(renderCard).join('')}</div>`;
}

function renderCard(d) {
  const sc = scoreClass(d.score);
  const rc = recClass(d.rec);
  const ov = state.overrides[d.id] || {};
  const status = ov.status || d.status;
  const sel = selectedId === d.id ? 'selected' : '';
  const rLabel = d.research ? `<span class="priority-badge p${Math.min(d.priority,3)}">${d.priority}</span>` : '';
  return `<div class="card ${sel}" onclick="selectCard('${d.id}')">
    <div class="card-top">
      <div>
        <div class="card-company">${d.company} ${rLabel}</div>
        <div class="card-role">${d.role}</div>
      </div>
      <div class="score-badge ${sc}">
        ${d.score.toFixed(1)}<div class="label">/ 5</div>
      </div>
    </div>
    <div class="card-meta">
      <span class="status-pill ${statusClass(status)}">${status}</span>
      <span class="chip chip-location">📍 ${d.location}</span>
      ${d.comp && d.comp !== 'Unverified' ? `<span class="chip chip-location" style="color:var(--green);border-color:rgba(16,185,129,0.2);background:var(--green-dim)">💰 ${d.comp}</span>` : ''}
    </div>
    <div class="card-tags">${(d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="card-rec"><span class="${rc}">● ${d.rec}</span></div>
  </div>`;
}

function renderTable(items) {
  const rows = items.map(d => {
    const ov = state.overrides[d.id] || {};
    const status = ov.status || d.status;
    const sel = selectedId === d.id ? 'selected' : '';
    return `<tr class="${sel}" onclick="selectCard('${d.id}')">
      <td class="td-company">${d.company}</td>
      <td class="td-role"><div style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.role}</div></td>
      <td class="td-score" style="color:${scoreColor(d.score)}">${d.score.toFixed(2)}</td>
      <td><span class="status-pill ${statusClass(status)}">${status}</span></td>
      <td><span class="${recClass(d.rec)}" style="font-size:12px;font-weight:500">${d.rec}</span></td>
      <td style="font-size:12px;color:var(--fg-muted)">${d.location}</td>
      <td style="font-size:12px;color:var(--fg-muted)">${d.comp && d.comp!=='Unverified'?d.comp:'—'}</td>
      <td><a href="${d.url}" target="_blank" onclick="event.stopPropagation()" class="link-btn" style="font-size:11px">JD ↗</a></td>
    </tr>`;
  }).join('');
  return `<div class="table-wrap"><table>
    <thead><tr>
      <th>Company</th><th>Role</th><th>Score</th><th>Status</th><th>Rec</th><th>Location</th><th>Comp</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function selectCard(id) {
  if (selectedId === id) {
    selectedId = null;
    closePanel();
    render();
    return;
  }
  selectedId = id;
  render();
  openPanel(id);
}

function closePanel() {

function updateStatus(id, val) {
  state.overrides[id] = state.overrides[id] || {};
  state.overrides[id].status = val;
  saveState();
  renderStats();
  toast('Status updated', true);
}

function saveNotes(id) {
  const val = document.getElementById('notes-ta').value;
  state.overrides[id] = state.overrides[id] || {};
  state.overrides[id].notes = val;
  saveState();
  toast('Notes saved ✓', true);
}

// ─── Add modal ────────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
}
function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
  ['f-company','f-role','f-url','f-score','f-location','f-comp','f-tags','f-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
}
function addEntry() {
  const company = document.getElementById('f-company').value.trim();
  const role = document.getElementById('f-role').value.trim();
  if (!company || !role) { toast('Company and Role are required'); return; }
  const score = parseFloat(document.getElementById('f-score').value) || 0;
  const entry = {
    id: 'custom-' + Date.now(),
    company,
    role,
    score,
    status: document.getElementById('f-status').value,
    rec: document.getElementById('f-rec').value,
    url: document.getElementById('f-url').value.trim() || '#',
    location: document.getElementById('f-location').value.trim() || 'Unknown',
    comp: document.getElementById('f-comp').value.trim() || 'Unverified',
    date: new Date().toISOString().slice(0,10),
    tags: document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    blocks: null,
    match: document.getElementById('f-notes').value.trim(),
    gaps: '',
    research: null,
    priority: 50,
    notes: '',
  };
  state.custom.push(entry);
  saveState();
  closeAddModal();
  render();
  toast(`Added ${company} ✓`, true);
}

// ─── Toast ────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, success=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (success?' green':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
  if (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'n' && !['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) {
    openAddModal();
  }
});
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAddModal();
});

// ─── Copy contact message ─────────────────────────────────────────────────
function copyMsg(elemId, key) {
  const el = document.getElementById(elemId);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent.trim()).then(() => toast('Copied ✓', true));
}

// ─── Init ────────────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
